version: 1
name: p0-tower-restart-recovers-small
seed: 308
suite: p0
priority: p0
tags: [virtual, node, restart]
status: active

provider:
  type: virtual

world:
  networks: 1
  sites_per_network: 1
  nodes_per_site:
    tower: 1
    amplifier: 1
    controller: 1
  ues_per_site: 2

packages:
  - ref: daily_1gb
    name: Daily 1GB
    data_mb: 1024
    duration_days: 1
    amount: 1.00
    assign_percent: 100

setup:
  create_via_bff:
    - networks
    - sites
    - nodes
    - node_site_links
    - packages
    - subscribers
    - sims

runtime:
  start: [nodes, ues]
  wait: [nodes_ready, ues_attached]

phases:
  - name: before_restart
    events:
      - type: traffic
        ues: all
        amount_mb: 10
    checks:
      - type: traffic_allowed
        ues: all
        amount_mb: 1

  - name: restart_tower
    events:
      - type: restart_nodes
        type_selector: tower
        count: 1
      - type: wait_nodes_ready
        nodes: all
    checks:
      - type: node_ready
        nodes: all

  - name: after_restart
    events:
      - type: traffic
        ues: all
        amount_mb: 10
    checks:
      - type: usage_sample
        sample_per_site: 1
        expected: from_model
        tolerance_percent: 10

final_checks:
  - type: balance_non_negative
    ues: all
