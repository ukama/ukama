version: 1
name: p0-two-networks-isolation-small
seed: 305
suite: p0
priority: p0
tags: [virtual, bff, multi-network]
status: active

provider:
  type: virtual

world:
  networks: 2
  sites_per_network: 1
  nodes_per_site:
    tower: 1
    amplifier: 1
    controller: 1
  ues_per_site: 2

packages:
  - ref: daily_1gb
    name: Daily 1GB
    data_mb: 1024
    duration_days: 1
    amount: 1.00
    assign_percent: 100

setup:
  create_via_bff:
    - networks
    - sites
    - nodes
    - node_site_links
    - packages
    - subscribers
    - sims

runtime:
  start: [nodes, ues]
  wait: [nodes_ready, ues_attached]

phases:
  - name: both_networks_traffic
    events:
      - type: traffic
        ues: all
        amount_mb: 10
    checks:
      - type: backend_count
        target: networks
        expected: from_world
      - type: backend_count
        target: sites
        expected: from_world
      - type: backend_count
        target: sims
        expected: from_world
      - type: usage_sample
        sample_per_site: 1
        expected: from_model
        tolerance_percent: 5

final_checks:
  - type: dashboard_loads
    networks: all
  - type: balance_non_negative
    ues: all
