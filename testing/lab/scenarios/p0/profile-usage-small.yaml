version: 1
name: p0-profile-usage-small
seed: 310
suite: p0
priority: p0
tags: [virtual, usage, profile]
status: active

provider:
  type: virtual

world:
  networks: 1
  sites_per_network: 1
  nodes_per_site:
    tower: 1
    amplifier: 1
    controller: 1
  ues_per_site: 6

packages:
  - ref: daily_1gb
    name: Daily 1GB
    data_mb: 1024
    duration_days: 1
    amount: 1.00
    assign_percent: 100

setup:
  create_via_bff:
    - networks
    - sites
    - nodes
    - node_site_links
    - packages
    - subscribers
    - sims

runtime:
  start: [nodes, ues]
  wait: [nodes_ready, ues_attached]

profiles:
  usage:
    light:
      percent: 50
      amount_mb: 25
    normal:
      percent: 33
      amount_mb: 100
    heavy:
      percent: 17
      amount_mb: 250

phases:
  - name: profile_traffic
    events:
      - type: traffic_by_profile
        ues: all
        profile: usage
    checks:
      - type: usage_sample
        sample_per_site: 3
        expected: from_model
        tolerance_percent: 5

final_checks:
  - type: backend_count
    target: sims
    expected: from_world
  - type: balance_non_negative
    ues: all
