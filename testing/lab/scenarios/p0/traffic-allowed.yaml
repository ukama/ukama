version: 1
name: p0-traffic-allowed
seed: 304
suite: p0
priority: p0
tags: [virtual, runtime, traffic]
status: active

provider:
  type: virtual

world:
  networks: 1
  sites_per_network: 1
  nodes_per_site:
    tower: 1
    amplifier: 1
    controller: 1
  ues_per_site: 1

packages:
  - ref: daily_1gb
    name: Daily 1GB
    data_mb: 1024
    duration_days: 1
    amount: 1.00
    assign_percent: 100

setup:
  create_via_bff:
    - networks
    - sites
    - nodes
    - node_site_links
    - packages
    - subscribers
    - sims

runtime:
  start: [nodes, ues]
  wait: [nodes_ready, ues_attached]

phases:
  - name: traffic_check
    events:
      - type: traffic
        ues: all
        amount_mb: 25
    checks:
      - type: usage_per_sim
        ues: all
        expected_used_mb: 25
        tolerance_percent: 5
      - type: traffic_allowed
        ues: all
        amount_mb: 1

final_checks:
  - type: balance_non_negative
    ues: all
