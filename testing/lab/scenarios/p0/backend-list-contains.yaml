version: 1
name: p0-backend-list-contains
seed: 302
suite: p0
priority: p0
tags: [virtual, bff, read-model]
status: active

provider:
  type: virtual

world:
  networks: 1
  sites_per_network: 1
  nodes_per_site:
    tower: 1
    amplifier: 1
    controller: 1
  ues_per_site: 1

packages:
  - ref: daily_1gb
    name: Daily 1GB
    data_mb: 1024
    duration_days: 1
    amount: 1.00
    assign_percent: 100

setup:
  create_via_bff:
    - networks
    - sites
    - nodes
    - node_site_links
    - packages
    - subscribers
    - sims

runtime:
  start: [nodes, ues]
  wait: [nodes_ready, ues_attached]

phases:
  - name: list_checks
    events:
      - type: check
    checks:
      - type: list_contains
        view: networks
        ref: net-001
      - type: list_contains
        view: sites
        ref: site-001
      - type: list_contains
        view: nodes
        ref: tower-site-001-001
      - type: list_contains
        view: sims
        ref: ue-000001

final_checks:
  - type: backend_count
    target: sims
    expected: from_world
