version: 1
name: usage-accumulation
seed: 42
suite: wip
priority: p2
tags: [wip]
status: wip

provider:
  type: virtual

world:
  networks: 1
  sites_per_network: 1
  nodes_per_site:
    tower: 1
    amplifier: 1
    controller: 1
  ues_per_site: 1

packages:
  - ref: daily_1gb
    name: Daily 1GB
    data_mb: 1024
    duration_days: 1
    amount: 1.00
    assign_percent: 100

setup:
  create_via_bff:
    - networks
    - sites
    - nodes
    - node_site_links
    - packages
    - subscribers
    - sims

runtime:
  start: [nodes, ues]
  wait: [nodes_ready, ues_attached]

phases:
  - name: use_100mb
    events:
      - type: traffic
        ues: all
        amount_mb: 100
    checks:
      - type: usage_per_sim
        ues: all
        expected_used_mb: 100
        tolerance_percent: 2

  - name: use_200mb_more
    events:
      - type: traffic
        ues: all
        amount_mb: 200
    checks:
      - type: usage_per_sim
        ues: all
        expected_used_mb: 300
        tolerance_percent: 2

final_checks:
  - type: backend_count
    target: networks
    expected: 1
  - type: backend_count
    target: sites
    expected: 1
  - type: backend_count
    target: nodes
    expected: 3
  - type: backend_count
    target: sims
    expected: 1
  - type: package_active
    ues: all
    package: daily_1gb
  - type: balance_non_negative
    ues: all
  - type: dashboard_loads
    networks: all
