version: 1
name: one-site-one-ue
seed: 1

world:
  networks: 1
  sites_per_network: 1
  nodes_per_site:
    tower: 1
    access: 1
    home: 1
  ues_per_site: 1

packages:
  - ref: daily_1gb
    name: Daily 1GB
    data_mb: 1024
    duration_hours: 24
    amount: 1.00
    assign_percent: 100

setup:
  create_via_bff:
    - networks
    - sites
    - nodes
    - node_site_links
    - packages
    - subscribers
    - sims

runtime:
  start: [nodes, ues]
  wait: [nodes_ready, ues_attached]

phases:
  - name: first_usage
    events:
      - type: traffic
        ues: all
        amount_mb: 100
    checks:
      - type: usage_per_sim
        ues: all
        expected: from_model
        tolerance_percent: 2

final_checks:
  - type: count
    target: nodes
    expected: 3
  - type: package_active
    ues: all
    package: daily_1gb
  - type: balance_non_negative
    ues: all
