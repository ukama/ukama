version: 1
name: lifecycle-sim-status-toggle
seed: 503
suite: lifecycle
priority: p1
tags: [virtual, lifecycle, sim]
status: active

provider:
  type: virtual

world:
  networks: 1
  sites_per_network: 1
  nodes_per_site:
    tower: 1
    amplifier: 1
    controller: 1
  ues_per_site: 1

packages:
  - ref: daily_1gb
    name: Daily 1GB
    data_mb: 1024
    duration_days: 1
    amount: 1.00
    assign_percent: 100

setup:
  create_via_bff:
    - networks
    - sites
    - nodes
    - node_site_links
    - packages
    - subscribers
    - sims

runtime:
  start: [nodes, ues]
  wait: [nodes_ready, ues_attached]

phases:
  - name: mark_inactive
    events:
      - type: set_sim_status
        ues: all
        status: inactive
    checks:
      - type: backend_count
        target: sims
        expected: from_world

  - name: mark_active
    events:
      - type: set_sim_status
        ues: all
        status: active
    checks:
      - type: backend_count
        target: sims
        expected: from_world

final_checks:
  - type: balance_non_negative
    ues: all
