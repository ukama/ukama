version: 1
name: lifecycle-sim-package-remove-add
seed: 501
suite: lifecycle
priority: p1
tags: [virtual, lifecycle, sim, package]
status: active

provider:
  type: virtual

world:
  networks: 1
  sites_per_network: 1
  nodes_per_site:
    tower: 1
    amplifier: 1
    controller: 1
  ues_per_site: 1

packages:
  - ref: daily_1gb
    name: Daily 1GB
    data_mb: 1024
    duration_days: 1
    amount: 1.00
    assign_percent: 100

setup:
  create_via_bff:
    - networks
    - sites
    - nodes
    - node_site_links
    - packages
    - subscribers
    - sims

runtime:
  start: [nodes, ues]
  wait: [nodes_ready, ues_attached]

phases:
  - name: remove_package
    events:
      - type: remove_package_from_sim
        ues: all
    checks:
      - type: status_equals
        entity: sim
        ref: ue-000001
        status: inactive

  - name: add_package_back
    events:
      - type: add_package_to_sim
        ues: all
        package: daily_1gb
    checks:
      - type: status_equals
        entity: sim
        ref: ue-000001
        status: active
      - type: package_active
        ues: all
        package: daily_1gb

final_checks:
  - type: backend_count
    target: sims
    expected: from_world
  - type: balance_non_negative
    ues: all
