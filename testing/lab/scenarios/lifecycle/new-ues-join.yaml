version: 1
name: new-ues-join
seed: 100
suite: wip
priority: p2
tags: [wip]
status: wip

provider:
  type: virtual

world:
  networks: 1
  sites_per_network: 2
  nodes_per_site:
    tower: 1
    amplifier: 1
    controller: 1
  ues_per_site: 20

packages:
  - ref: daily_1gb
    name: Daily 1GB
    data_mb: 1024
    duration_days: 1
    amount: 1.00
    assign_percent: 100

setup:
  create_via_bff:
    - networks
    - sites
    - nodes
    - node_site_links
    - packages
    - subscribers
    - sims

runtime:
  start: [nodes, ues]
  wait: [nodes_ready, ues_attached]

phases:
  - name: initial_usage
    events:
      - type: traffic
        ues: all
        amount_mb: 100
    checks:
      - type: usage_sample
        sample_per_site: 5
        expected: from_model
        tolerance_percent: 2

# create_ues is part of the language but intentionally disabled in v1.0
# until BFF delete/replay semantics and runtime identity reuse are finalized.
final_checks:
  - type: model_count
    target: sims
    expected: 40
  - type: balance_non_negative
    ues: all
