version: 1
name: two-networks-many-ues
seed: 77
suite: wip
priority: p2
tags: [wip]
status: wip

world:
  networks: 2
  sites_per_network: 3
  nodes_per_site:
    tower: 1
    amplifier: 1
    controller: 1
  ues_per_site: 50

packages:
  - ref: daily_1gb
    name: Daily 1GB
    data_mb: 1024
    duration_days: 1
    amount: 1.00
    assign_percent: 70
  - ref: weekly_10gb
    name: Weekly 10GB
    data_mb: 10240
    duration_days: 7
    amount: 7.00
    assign_percent: 30

setup:
  create_via_bff:
    - networks
    - sites
    - nodes
    - node_site_links
    - packages
    - subscribers
    - sims

runtime:
  start: [nodes, ues]
  wait: [nodes_ready, ues_attached]

profiles:
  usage:
    light:
      percent: 60
      amount_mb: 50
    normal:
      percent: 30
      amount_mb: 200
    heavy:
      percent: 10
      amount_mb: 700

phases:
  - name: morning_usage
    events:
      - type: traffic_by_profile
        ues: all
        profile: usage
    checks:
      - type: usage_sample
        sample_per_site: 5
        expected: from_model
        tolerance_percent: 2

final_checks:
  - type: model_count
    target: networks
    expected: 2
  - type: model_count
    target: sites
    expected: 6
  - type: model_count
    target: nodes
    expected: 24
  - type: model_count
    target: sims
    expected: 300
  - type: dashboard_loads
    networks: all
  - type: balance_non_negative
    ues: all
