[build-from]
	base="alpine"
	version="latest"

[build-compile]
	version="0.1"
	static="false"
	source="/nodes/apps/backhaul"
	cmd="make"
	bin_from="/nodes/apps/backhaul/backhaul-monitor"
	bin_to="/sbin"

[capp-exec]
	name="backhaul"
	version="latest"
	bin="backhaul-monitor"
	path="/sbin"
	autostart="false"
	autorestart="true"
	startretries=5
	group="service"
