[build-from]
	base="alpine"
	version="latest"

[build-compile]
	version="latest"
	static="false"
	source="/nodes/apps/epcemu"
	cmd="make"
	bin_from="/nodes/apps/epcemu/epcemu"
	bin_to="/sbin"

[app-exec]
	name="epcemu"
	version="latest"
	bin="epcemu"
	path="/sbin"
	autostart="false"
	autorestart="true"
	startretries=5
	group="on-boot"
