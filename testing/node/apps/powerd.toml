[build-from]
    base="alpine"
    version="latest"

[build-compile]
	version="0.1"
	static="false"
	source="/nodes/apps/power"
	cmd="make"
	bin_from="/nodes/apps/power/power-monitor"
	bin_to="/sbin"

[capp-exec]
	name="power"
	version="latest"
	bin="power-monitor"
	path="/sbin"
	autostart="false"
        autorestart="true"
        startretries=5
	group="service"
