version: '3.9'
services:
 api:
  build: ./api-gateway
  ports:
   - '8878:8080'
  restart: always
  environment:
   - BYPASS_AUTH_MODE=true
   - HTTP_SUBSCRIBERHOST=http://${LOCAL_HOST_IP}:8078
   - HTTP_DATAPLANHOST=http://${LOCAL_HOST_IP}:8074
   - HTTP_REGISTRYHOST=http://${LOCAL_HOST_IP}:8075
  networks:
   - ukama-net

networks:
 ukama-net:
  external: true
  name: services_ukama-net
