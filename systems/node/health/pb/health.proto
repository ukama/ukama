syntax = "proto3";
option go_package = "github.com/ukama/ukama/systems/node/health/pb/gen";
package ukama.node.health.v1;
import "validator.proto";
import "google/protobuf/timestamp.proto";
import "ukama/filter_timeframes.proto";

service HealthService {
    rpc List (ListRequest) returns (ListResponse);
    rpc GetApps (GetAppsRequest) returns (GetAppsResponse);
    rpc StoreHealthReport (StoreHealthReportRequest) returns (StoreHealthReportResponse);
}

message GetAppsRequest {
    string nodeId = 1;
}

message GetAppsResponse {
    repeated App apps = 1;
}

message ListRequest {
    string reportId = 1;
    string nodeId = 2;
    google.protobuf.Timestamp reportedAt = 3;
    ukama.common.v1.FilterTimeframesType timeframe = 4;
}

message ListResponse {
    repeated HealthReport reports = 1;
}

message StoreHealthReportRequest {
    string nodeId = 1 [(validator.field) = {string_not_empty: true}];
    bytes payload = 2;
}

message StoreHealthReportResponse {
    string reportId = 1;
}

message HealthReport {
    string id = 1;
    string nodeId = 2;
    string nodeType = 3;
    string schemaVersion = 4;
    google.protobuf.Timestamp reportedAt = 5;
    google.protobuf.Timestamp receivedAt = 6;
    bytes payload = 7;
}

message App {
    string name = 1;
    string version = 2;
    string tag = 3;
    string status = 4;
}
