version: "3.2"
services:
  postgresd-node:
    image: postgres:13.3
    ports:
      - "5405:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Pass2020!
    networks:
      - ukama-net
    volumes:
      - postgress-data:/var/lib/postgresql

  # controller:
  #   build: ./controller
  #   ports:
  #     - "9060:9090"
  #   environment:
  #     - DEBUGMODE=true
  #     - ORGID=8c6c2bec-5f90-4fee-8ffd-ee6456abf4fc
  #     - ORGNAME=ukama-test-org
  #     - QUEUE_URI=amqp://guest:guest@${LOCAL_HOST_IP}:5672
  #     - MSGCLIENT_HOST=msgclient-registry:9095
  #     - CONTROLLER_SERVICE_HOST=controller
  #     - CONTROLLER_SERVICE_PORT=9090
  #     - OWNERID=018688fa-d861-4e7b-b119-ffc5e1637ba8
  #     - ORGREGISTRYHOST=http://${LOCAL_HOST_IP}:8060
  #   restart: always
  #   networks:
  #     - ukama-net
  #   depends_on:
  #     - msgclient-registry

  health:
    build: ./health
    ports:
      - "9061:9090"
    environment:
      - DEBUGMODE=true
      - DB_HOST=postgresd-node
      - DB_PASSWORD=Pass2020!
      - DB_USER=postgres
      - OWNERID=018688fa-d861-4e7b-b119-ffc5e1637ba8
      - ORGID=8c6c2bec-5f90-4fee-8ffd-ee6456abf4fc
      - ORGNAME=ukama-test-org
      - QUEUE_URI=amqp://guest:guest@${LOCAL_HOST_IP}:5672
      - MSGCLIENT_HOST=msgclient-node:9095
      - HEALTH_SERVICE_HOST=health
      - HEALTH_SERVICE_PORT=9090
      - PUSHGATEWAY=http://${LOCAL_HOST_IP}:9099
      - INITCLIENTHOST=http://initclient-node:8080
    restart: always
    networks:
      - ukama-net
    depends_on:
      - msgclient-node

  software:
    build: ./software-manager
    ports:
      - "9069:9090"
    environment:
      - DEBUGMODE=true
      - DB_HOST=postgresd-node
      - DB_PASSWORD=Pass2020!
      - DB_USER=postgres
      - ORGID=8c6c2bec-5f90-4fee-8ffd-ee6456abf4fc
      - QUEUE_URI=amqp://guest:guest@${LOCAL_HOST_IP}:5672
      - MSGCLIENT_HOST=msgclient-node:9095
      - SOFTWARE_SERVICE_HOST=software
      - SOFTWARE_SERVICE_PORT=9090
      - ORGNAME=ukama-test-org
    restart: always
    networks:
      - ukama-net
    depends_on:
      - msgclient-node

  node-gateway-node:
    build:
      dockerfile: ./Dockerfile
      context: ./node-gateway
    restart: always
    ports:
      - "8075:8080"
    networks:
      - ukama-net
    environment:
      - DEBUGMODE=true
      - BYPASS_AUTH_MODE=true
      # - CORS_ALLOWALLORIGINS=true
      # - CORS_ALLOWORIGINS=""
    depends_on:
      - health
      - postgresd-node

  api-gateway-node:
    build:
      dockerfile: ./Dockerfile
      context: ./api-gateway
    restart: always
    ports:
      - "8077:8081"
    networks:
      - ukama-net
    environment:
      - DEBUGMODE=true
      - BYPASS_AUTH_MODE=true
      # - CORS_ALLOWALLORIGINS=true
      # - CORS_ALLOWORIGINS=""
    depends_on:
      - health
      - postgresd-node

  msgclient-node:
    build: ../services/msgClient
    ports:
      - "9095:9095"
    environment:
      - DEBUGMODE=true
      - DB_HOST=postgresd-node
      - DB_PASSWORD=Pass2020!
      - DB_USER=postgres
      - QUEUE_URI=amqp://guest:guest@${LOCAL_HOST_IP}:5672
      - SYSTEM=node
    restart: always
    networks:
      - ukama-net
    depends_on:
      - postgresd-node

  initclient-node:
    image: 003664043471.dkr.ecr.us-east-1.amazonaws.com/services/initclient:main-31
    environment:
      - ENV_SYSTEM_ORG=ukama-test-org
      - ENV_DNS_REFRESH_TIME_PERIOD=30
      - ENV_SYSTEM_NAME=node
      - ENV_SYSTEM_DNS=node-gateway-node
      - ENV_DNS_SERVER=false
      - ENV_SYSTEM_PORT=8080
      - ENV_SYSTEM_CERT=This-is-a-certificate
      - ENV_INIT_SYSTEM_ADDR=${LOCAL_HOST_IP}
      - ENV_INIT_SYSTEM_PORT=8071
      - ENV_INIT_CLIENT_ADDR=initclient-node
      - ENV_INIT_CLIENT_PORT=8080
      - ENV_INIT_CLIENT_TEMP_FILE=/tmp/tmpfile
    restart: always
    networks:
      - ukama-net

networks:
  ukama-net:
    external: true
    name: services_dev-net

volumes:
  postgress-data:
