syntax = "proto3";
option go_package = "github.com/ukama/ukama/systems/node/operation-monitor/pb/gen";
package ukama.node.operationmonitor.v1;

import "validator.proto";
import "google/protobuf/timestamp.proto";

service OperationMonitorService {
    rpc RegisterIntent(RegisterIntentRequest) returns (RegisterIntentResponse);
    rpc GetIntent(GetIntentRequest) returns (GetIntentResponse);
    rpc CancelIntent(CancelIntentRequest) returns (CancelIntentResponse);
}

enum IntentStatus {
    WATCHING  = 0;
    COMPLETED = 1;
    FAILED    = 2;
    EXPIRED   = 3;
    CANCELLED = 4;
}

message MonitoredIntent {
    string id = 1;
    string operationId = 2;
    string resourceKey = 3;
    string actionType = 4;
    uint64 fencingToken = 5;
    string completionRule = 6;
    IntentStatus status = 7;
    google.protobuf.Timestamp deadline = 8;
    google.protobuf.Timestamp createdAt = 9;
}

message RegisterIntentRequest {
    string operationId = 1 [(validator.field) = {uuid_ver: 4, string_not_empty: true}];
    string resourceKey = 2 [(validator.field) = {string_not_empty: true}];
    string actionType = 3 [(validator.field) = {string_not_empty: true}];
    uint64 fencingToken = 4 [(validator.field) = {int_gt: 0}];
    string completionRule = 5;
    uint32 deadlineSeconds = 6;
}

message RegisterIntentResponse {
    MonitoredIntent intent = 1;
}

message GetIntentRequest {
    string operationId = 1 [(validator.field) = {uuid_ver: 4, string_not_empty: true}];
}

message GetIntentResponse {
    MonitoredIntent intent = 1;
}

message CancelIntentRequest {
    string operationId = 1 [(validator.field) = {uuid_ver: 4, string_not_empty: true}];
}

message CancelIntentResponse {}
