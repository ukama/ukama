version: '3.3'
services:
 postgresd-operation:
  image: postgres:13.3
  ports:
   - 5495:5432
  environment:
   - POSTGRES_USER=postgres
   - POSTGRES_PASSWORD=Pass2020!
  networks:
   - ukama-net
  volumes:
   - postgress-data:/var/lib/postgresql

 manager:
  build: ./manager
  environment:
   - DEBUGMODE=true
   - DB_HOST=postgresd-operation
   - DB_PASSWORD=Pass2020!
   - DB_USER=postgres
   - QUEUE_URI=amqp://guest:guest@${LOCAL_HOST_IP}:5672
   - MSGCLIENT_HOST=msgclient-operation:9095
   - MANAGER_SERVICE_HOST=manager
   - MANAGER_SERVICE_PORT=9090
   - ORGNAME=${ORGNAME}
   - ORGID=${ORGID}
  restart: always
  networks:
   - ukama-net
  depends_on:
   - msgclient-operation
   - postgresd-operation

 api-gateway-operation:
  build: ./api-gateway
  restart: always
  ports:
   - 8098:8080
  networks:
   - ukama-net
  environment:
   - DEBUGMODE=true
   - BYPASS_AUTH_MODE=true
   - SERVICES_MANAGER=manager:9090
   - HTTPSERVICES_REGISTRYHOST=http://api-gateway-registry:8080
  depends_on:
   - manager
   - postgresd-operation
   - initclient-operation

 msgclient-operation:
  build: ../services/msgClient
  environment:
   - DEBUGMODE=true
   - DB_HOST=postgresd-operation
   - DB_PASSWORD=Pass2020!
   - DB_USER=postgres
   - QUEUE_URI=amqp://guest:guest@${LOCAL_HOST_IP}:5672
   - GRPC_PORT=9095
   - SYSTEM=operation
  restart: always
  networks:
   - ukama-net
  depends_on:
   - postgresd-operation

 initclient-operation:
  image: main-init
  environment:
   - ENV_SYSTEM_ORG=${ORGNAME}
   - ENV_DNS_REFRESH_TIME_PERIOD=30
   - ENV_SYSTEM_NAME=operation
   - ENV_SYSTEM_DNS=api-gateway-operation
   - ENV_DNS_SERVER=false
   - ENV_SYSTEM_PORT=8080
   - ENV_SYSTEM_CERT=This-is-a-certificate
   - ENV_INIT_SYSTEM_ADDR=${LOCAL_HOST_IP}
   - ENV_INIT_SYSTEM_PORT=8071
   - ENV_INIT_CLIENT_ADDR=initclient-operation
   - ENV_INIT_CLIENT_PORT=8080
   - ENV_INIT_CLIENT_TEMP_FILE=/tmp/tmpfile
  restart: always
  networks:
   - ukama-net

networks:
 ukama-net:
  external: true
  name: services_ukama-net

volumes:
 postgress-data:
