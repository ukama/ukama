# Default metrics map for api-gateway.
# Structure: nodeType -> genericKey -> { metric, needRate, rateInterval }
#
# Node types: tnode, anode, cnode (hardware nodes), system (platform-level KPIs)
#
# The generic key is what callers use in API requests (e.g. "cpu").
# The "metric" field is the actual Prometheus series name stored in the metrics store.
#
# Override the entire file via env METRICS_KEY_MAP_FILE (path to YAML with same structure).

# ---------------------------------------------------------------------------
# TNode — shared-board metrics (com_*) and radio sub-board metrics (trx_*)
# Node ID pattern: uk-<site>-tnode-<ver>-<suffix>
# ---------------------------------------------------------------------------
tnode:
  cpu:
    metric: com_soc_cpu_usage
    needRate: false
    rateInterval: ""
    unit: "%"
    format: "number"
    tickInterval: 20
    tickPositions: [0, 20, 40, 60, 80, 100]
    threshold: { min: 0, normal: 80, max: 100 }
  cpu_temperature:
    metric: com_power_power_power_board_temp_c_celsius
    needRate: false
    rateInterval: ""
    unit: "C"
    format: "number"
    tickInterval: 10
    tickPositions: [0, 10, 20, 30, 40, 50, 60, 70, 80]
