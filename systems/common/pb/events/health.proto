syntax = "proto3";

option go_package = "github.com/ukama/ukama/systems/common/pb/gen/events";

package ukama.events.v1;
 
message HealthReportEvent {
    string id = 1;
    string nodeId = 2;
    string nodeType = 3;
    string schemaVersion = 4;
    string reportedAt = 5;
    bytes  payload = 6;
}
