boards:
  tnode:
    name: "Tower Node (COM Board)"
    method: "network"
    network:
      host_eth: "enp0s25"
      host_ip: "192.168.100.1"
      target_ip: "192.168.100.2"
    image:
      name: "ukama-com-image.img"
      path: "/home/kashif/work/ukama/repos/ukama/builder/scripts/build-system/ukama-com-image.img"
    host_device:
      device: "/dev/sdb"
      iso_url: "https://dl-cdn.alpinelinux.org/alpine/v3.20/releases/x86_64/alpine-standard-3.20.0-x86_64.iso"
    serial:
      device: "/dev/ttyUSB0"
      baud: 115200
    flash:
      target_device: "/dev/mmcblk1"
      success_marker: "Flash complete. Rebooting."
      boot_marker: "login:"

  anode:
    name: "Amplifier Node (Controller Board)"
    method: "network"
    network:
      host_eth: "enp0s25"
      host_ip: "192.168.100.1"
      target_ip: "192.168.100.2"
    image:
      name: "ukama-amplifier-image.img"
      path: "/home/kashif/work/ukama/repos/ukama/builder/scripts/build-system/ukama-amplifier-image.img"
    host_device:
      device: "/dev/sdcard"
      iso_url: "https://dl-cdn.alpinelinux.org/alpine/v3.20/releases/x86_64/alpine-standard-3.20.0-x86_64.iso"
    serial:
      device: "/dev/ttyUSB0"
      baud: 115200
    flash:
      target_device: "/dev/mmcblk0"
      success_marker: "Flash complete. Rebooting."
      boot_marker: "login:"

  cnode:
    name: "Controller Node (Raspberry Pi)"
    method: "rpiboot"
    image:
      name: "cnode-image.img"
      path: "../build-system/cnode-image.img"
    serial:
      device: "/dev/ttyUSB0"
      baud: 115200
