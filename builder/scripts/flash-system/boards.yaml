boards:
  tnode:
    name: "Tower Node (COM Board)"
    method: "network"
    network:
      host_eth: "enp0s31f6"
      host_ip: "192.168.100.1"
      target_ip: "192.168.100.2"
    image:
      name: "ukama-com-image.img"
      path: "/usr/ukm/ukama/builder/scripts/build-system/ukama-com-image.img"
    host_device:
      device: "/dev/sda"
      iso_url: "https://dl-cdn.alpinelinux.org/alpine/v3.20/releases/x86_64/alpine-standard-3.20.0-x86_64.iso"
    serial:
      device: "/dev/ttyUSB0"
      baud: 115200
    flash:
      target_device: "/dev/mmcblk1"
      success_marker: "Flash complete. Rebooting."
      boot_marker: "login:"

  anode:
    name: "Amplifier Node (Controller Board)"
    method: "sd-card"
    tarballs:
      boot: "/usr/ukm/ukama/builder/scripts/build-system/boot.tgz"
      rootfsA: "/usr/ukm/ukama/builder/scripts/build-system/rootfsA.tgz"
      rootfsB: "/usr/ukm/ukama/builder/scripts/build-system/rootfsB.tgz"
    sd_card:
      device: "/dev/sda"
    serial:
      device: "/dev/ttyUSB0"
      baud: 115200
    flash:
      target_device: "/dev/mmcblk0"
      success_marker: "Flash complete. Rebooting."
      boot_marker: "login:"

  cnode:
    name: "Controller Node (Raspberry Pi)"
    method: "rpiboot"
    image:
      name: "cnode-image.img"
      path: "../build-system/cnode-image.img"
    serial:
      device: "/dev/ttyUSB0"
      baud: 115200
