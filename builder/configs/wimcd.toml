[build-from]
        rootfs="default"
        contained="default"

[build-compile]
        version="0.1"
        static="false"
        source="/nodes/ukamaOS/distro/system/wimcd"
        cmd="make"
        bin_from="/nodes/ukamaOS/distro/system/wimcd/wimc.d"
        bin_to="/sbin"

[build-misc]
        from="/nodes/ukamaOS/distro/system/wimcd/agent"
        to="/sbin"

[capp-exec]
        name="wimcd"
        version="latest"
        bin="wimc.d"
        path="/sbin"

[capp-output]
        format="tar.gz"
