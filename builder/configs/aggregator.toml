[build-from]
	rootfs="default"     # default is busybox minimal capp config
	contained="default"  # default namespace, cgroup, etc.

[build-compile]
	version="0.1"
	static="false"
	source="/nodes/ukamaOS/distro/system/aggregator"
	cmd="make"
	bin_from="/nodes/ukamaOS/distro/system/aggregator/aggregator"
	bin_to="/sbin"

[build-rootfs]
	mkdir="/conf"

[build-conf]
    from="/nodes/configs/apps/aggregator/aggregator_config.toml"
    to="/conf/config.toml"

# Following are use to create config.json file which is used by starter.d to start 
# the capp within ukamaOS and pkg everything
[capp-exec]
	name="aggregator"
	version="latest"
	bin="aggregator"
	path="/sbin" # path where the exec should be. Mathches build.bin_to
	args="--config /ukama/configs/aggregator/config.toml"

# Final output format for capp
[capp-output]
	format="tar.gz"
