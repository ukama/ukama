            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "tx_error"
            ext    = ""
            desc   = "Transmit errors"
            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "tx_dropped"
            ext    = ""
            desc   = "Transmit packets dropped"
            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "tx_overruns"
            ext    = ""
            desc   = "Transmit overruns"
            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "tx_packets"
            ext    = ""
            desc   = "Transmit packets"
            type   = "METRICTYPE_GAUGE"
            labels = []

[[stats]]
        [[stats.storage]]
            source = "emmc"
            agent = "ssd_agent"
            url ="/"

            [[stats.storage.emmc.kpi]]
                name = "total"
                ext = ""
                desc = "Total storage"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.storage.emmc.kpi]]
                name = "used"
                ext = ""
                desc = "Used storage"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.storage.emmc.kpi]]
                name = "free"
                ext = ""
                desc = "Available storage"
                type = "METRICTYPE_GAUGE"
                labels = []

[[stats]]
    [[stats.sensors]]
        source = "thermal_zone0"
        agent  = "thermal_agent"
        url    = "/sys/class/thermal/thermal_zone0/"

        [[stats.sensors.thermal_zone0.kpi]]
            name   = "temperature"
            ext    = "temp"
            desc   = "Processor temperature"
            unit   = "celsius"
            type   = "METRICTYPE_GAUGE"
            labels = []

[[stats]]
       [[stats.lte]]
            source = "stack"
            agent = "lte_agent"
            url = "/ukama/configs/metricsd/trx/lte_stack/lte_stats.file"
            [[stats.lte.stack.kpi]]
                name = "throughput_downlink"
                ext = ""
                desc = "Downlink throughput"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.lte.stack.kpi]]
                name = "throughput_uplink"
                ext = ""
                desc = "Uplink throughput"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.lte.stack.kpi]]
                name = "cell_id"
                ext = ""
                desc = "Cell identifier"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.lte.stack.kpi]]
                name = "signal_strength"
                ext = ""
                desc = "Signal strength"
                type = "METRICTYPE_GAUGE"
                labels = []
            [[stats.lte]]
                source = "core"
                agent = "lte_agent"
                url = "/ukama/configs/metricsd/trx/core/core.file"
                [[stats.lte.core.kpi]]
                    name = "active_ue"
                    ext = ""
                    desc = "Active UE in core network"
                    type = "METRICTYPE_GAUGE"
                    labels = []

                 [[stats.lte.core.kpi]]
                    name = "subscribers"
                    ext = ""
                    desc = "subscribers"
                    type = "METRICTYPE_GAUGE"
                    labels = []

