# This is a metrics.d config file
# sources tells where to read kpi data from.
# stats describe what to read and how to read kpi data.
# agents tells how to read data from source.
# URL tells path or http url
# EXT is used in extention to URL path as end point to reach specific api.
#cat /sys/class/thermal/thermal_zone7/temp cat /sys/class/thermal/thermal_zone7/type => x86_pkg_temp

version = "0.0.1"
scraping_time_period = 5
ukamnode = "TRX"
# +1 for admin
port = "7003"

[[stats]]
        [[stats.generic]]
            source = "system"
            agent = "generic_agent"
            url = ""
            [[stats.generic.system.kpi]]
                name = "uptime"
                ext = ""
                desc = "Time elapsed since most recent boot"
                unit = "seconds"
                type = "METRICTYPE_GAUGE"
                labels = []

[[stats]]
        [[stats.SoC]]
            source = "cpu"
            agent = "cpu_agent"
            url = "/proc/cpu_info"
            [[stats.SoC.cpu.kpi]]
                name = "cores"
                ext = ""
                desc = "Number of cores available"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu.kpi]]
                name= "usage"
                ext = ""
                desc = "CPU usage percentage"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu.kpi]]
                name = "user_usage"
                ext = ""
                desc = "User time in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu.kpi]]
                name= "system_usage"
                ext = ""
                desc = "System time in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu.kpi]]
                name= "nice"
                ext = ""
                desc = "CPU nice time in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu.kpi]]
                name = "idle_time"
                ext = ""
                desc = "Idle time in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu.kpi]]
                name= "io_wait_time"
                ext = ""
                desc = "I/O wait time in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu.kpi]]
                name= "hardirq"
                ext = ""
                desc = "Time used to handle HW IRQ in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu.kpi]]
                name= "softirq"
                ext = ""
                desc = "Time used to handle soft IRQ in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu.kpi]]
                name= "steal"
                ext = ""
                desc = "Time used by host VMs in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

        [[stats.SoC]]
            source = "cpu_core"
            agent = "cpu_agent"
            url = "/proc/cpu_info"
            range = [0, 1, 2 ]
            [[stats.SoC.cpu_core.kpi]]
                name = "frequency"
                ext = ""
                desc = "Frequency in MHz"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu_core.kpi]]
                name = "user_usage"
                ext = ""
                desc = "User time in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu_core.kpi]]
                name= "system_usage"
                ext = ""
                desc = "System time in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu_core.kpi]]
                name= "nice"
                ext = ""
                desc = "CPU nice time in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu_core.kpi]]
                name = "idle_time"
                ext = ""
                desc = "Idle time in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu_core.kpi]]
                name= "io_wait_time"
                ext = ""
                desc = "I/O wait time in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu_core.kpi]]
                name= "hardirq"
                ext = ""
                desc = "Time used to handle HW IRQ in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu_core.kpi]]
                name= "softirq"
                ext = ""
                desc = "Time used to handle soft IRQ in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu_core.kpi]]
                name= "steal"
                ext = ""
                desc = "Time used by host VMs in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []


[[stats]]
        [[stats.memory]]
            source = "ddr"
            agent = "memory_agent"
            url ="/proc/meminfo"

            [[stats.memory.ddr.kpi]]
                name = "total"
                ext = ""
                desc = "Total memory"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.memory.ddr.kpi]]
                name = "used"
                ext = ""
                desc = "Used memory"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.memory.ddr.kpi]]
                name = "free"
                ext = ""
                desc = "Free memory"
                type = "METRICTYPE_GAUGE"
                labels = []

        [[stats.memory]]
            source = "swap"
            agent = "memory_agent"
            url ="/proc/meminfo"

            [[stats.memory.swap.kpi]]
                name = "total"
                ext = ""
                desc = "Total swap memory"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.memory.swap.kpi]]
                name = "used_memory"
                ext = ""
                desc = "Used memory"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.memory.swap.kpi]]
                name = "free_memory"
                ext = ""
                desc = "Free memory"
                type = "METRICTYPE_GAUGE"
                labels = []

[[stats]]
    [[stats.network]]
        source = "uplink"
        agent  = "network_agent"
        url    = "/proc/net"

        [[stats.network.uplink.kpi]]
            name   = "link"
            ext    = ""
            desc   = "Link status"
            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "latency"
            ext    = ""
            desc   = "Latency to reach cloud"
            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "linkspeed"
            ext    = ""
            desc   = "Link speed negotiated"
            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "rx_bytes"
            ext    = ""
            desc   = "Received bytes"
            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "rx_error"
            ext    = ""
            desc   = "Receive errors"
            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "rx_dropped"
