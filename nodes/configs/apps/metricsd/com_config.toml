# This is a metrics.d config file
# sources tells where to read kpi data from.
# stats describe what to read and how to read kpi data.
# agents tells how to read data from source.
# URL tells path or http url
# EXT is used in extention to URL path as end point to reach specific api.
#cat /sys/class/thermal/thermal_zone7/temp cat /sys/class/thermal/thermal_zone7/type => x86_pkg_temp

version = "0.0.1"
scraping_time_period = 5
ukamnode = "COM"

[[stats]]
        [[stats.generic]]
            source = "system"
            agent = "generic_agent"
            url = ""
            [[stats.generic.system.kpi]]
                name = "uptime"
                ext = ""
                desc = "Time elapsed since most recent boot"
                unit = "seconds"
                type = "METRICTYPE_GAUGE"
                labels = []

[[stats]]
        [[stats.SoC]]
            source = "cpu"
            agent = "cpu_agent"
            url = "/proc/cpu_info"
            [[stats.SoC.cpu.kpi]]
                name = "cores"
                ext = ""
                desc = "Number of cores available"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu.kpi]]
                name= "usage"
                ext = ""
                desc = "CPU usage percentage"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu.kpi]]
                name = "user_usage"
                ext = ""
                desc = "User time in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu.kpi]]
                name= "system_usage"
                ext = ""
                desc = "System time in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu.kpi]]
                name= "nice"
                ext = ""
                desc = "CPU nice time in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu.kpi]]
                name = "idle_time"
                ext = ""
                desc = "Idle time in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu.kpi]]
                name= "io_wait_time"
                ext = ""
                desc = "I/O wait time in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu.kpi]]
                name= "hardirq"
                ext = ""
                desc = "Time used to handle HW IRQ in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu.kpi]]
                name= "softirq"
                ext = ""
                desc = "Time used to handle soft IRQ in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu.kpi]]
                name= "steal"
                ext = ""
                desc = "Time used by host VMs in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

        [[stats.SoC]]
            source = "cpu_core"
            agent = "cpu_agent"
            url = "/proc/cpu_info"
            range = [0, 1, 2, 3]
            [[stats.SoC.cpu_core.kpi]]
                name = "frequency"
                ext = ""
                desc = "Frequency in MHz"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu_core.kpi]]
                name = "user_usage"
                ext = ""
                desc = "User time in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu_core.kpi]]
                name= "system_usage"
                ext = ""
                desc = "System time in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu_core.kpi]]
                name= "nice"
                ext = ""
                desc = "CPU nice time in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu_core.kpi]]
                name = "idle_time"
                ext = ""
                desc = "Idle time in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu_core.kpi]]
                name= "io_wait_time"
                ext = ""
                desc = "I/O wait time in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu_core.kpi]]
                name= "hardirq"
                ext = ""
                desc = "Time used to handle HW IRQ in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu_core.kpi]]
                name= "softirq"
                ext = ""
                desc = "Time used to handle soft IRQ in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.SoC.cpu_core.kpi]]
                name= "steal"
                ext = ""
                desc = "Time used by host VMs in jiffies"
                type = "METRICTYPE_GAUGE"
                labels = []


[[stats]]
        [[stats.memory]]
            source = "ddr"
            agent = "memory_agent"
            url ="/proc/meminfo"

            [[stats.memory.ddr.kpi]]
                name = "total"
                ext = ""
                desc = "Total memory"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.memory.ddr.kpi]]
                name = "used"
                ext = ""
                desc = "Used memory"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.memory.ddr.kpi]]
                name = "free"
                ext = ""
                desc = "Free memory"
                type = "METRICTYPE_GAUGE"
                labels = []

        [[stats.memory]]
            source = "swap"
            agent = "memory_agent"
            url ="/proc/meminfo"

            [[stats.memory.swap.kpi]]
                name = "total"
                ext = ""
                desc = "Total swap memory"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.memory.swap.kpi]]
                name = "used_memory"
                ext = ""
                desc = "Used memory"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.memory.swap.kpi]]
                name = "free_memory"
                ext = ""
                desc = "Free memory"
                type = "METRICTYPE_GAUGE"
                labels = []

[[stats]]
    [[stats.network]]
        source = "uplink"
        agent  = "network_agent"
        url    = "/proc/net"

        [[stats.network.uplink.kpi]]
            name   = "link"
            ext    = ""
            desc   = "Link status"
            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "latency"
            ext    = ""
            desc   = "Latency to reach cloud"
            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "linkspeed"
            ext    = ""
            desc   = "Link speed negotiated"
            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "rx_bytes"
            ext    = ""
            desc   = "Received bytes"
            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "rx_error"
            ext    = ""
            desc   = "Receive errors"
            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "rx_dropped"
            ext    = ""
            desc   = "Receive packets dropped"
            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "rx_overruns"
            ext    = ""
            desc   = "Receive overruns"
            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "rx_packets"
            ext    = ""
            desc   = "Receive packets"
            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "tx_bytes"
            ext    = ""
            desc   = "Transmitted bytes"
            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "tx_error"
            ext    = ""
            desc   = "Transmit errors"
            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "tx_dropped"
            ext    = ""
            desc   = "Transmit packets dropped"
            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "tx_overruns"
            ext    = ""
            desc   = "Transmit overruns"
            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "tx_packets"
            ext    = ""
            desc   = "Transmit packets"
            type   = "METRICTYPE_GAUGE"
            labels = []

[[stats]]
        [[stats.storage]]
            source = "emmc"
            agent = "ssd_agent"
            url ="/"

            [[stats.storage.emmc.kpi]]
                name = "total"
                ext = ""
                desc = "Total storage"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.storage.emmc.kpi]]
                name = "used"
                ext = ""
                desc = "Used storage"
                type = "METRICTYPE_GAUGE"
                labels = []

            [[stats.storage.emmc.kpi]]
                name = "free"
                ext = ""
                desc = "Available storage"
                type = "METRICTYPE_GAUGE"
                labels = []

[[stats]]
	[[stats.backhaul]]
		source = "backhaul"
		agent  = "backhaul_agent"
		# url is treated as the PATH for the service endpoint
		# (agent will resolve port via /etc/services using usys_find_service_port()).
		url    = "/v1/status"

		[[stats.backhaul.backhaul.kpi]]
			name   = "state"
			ext    = ""
			desc   = "Backhaul state as numeric code (DOWN=0, LIMITED=1, GOOD=2, UNKNOWN=3)"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "link_guess"
			ext    = ""
			desc   = "Link classification numeric code (UNKNOWN=0, TERRESTRIAL_LIKE=1, SAT_LIKE=2, CELLULAR_LIKE=3)"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "confidence"
			ext    = ""
			desc   = "Classifier confidence (0..1)"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "dl_goodput_mbps"
			ext    = ""
			desc   = "Downlink goodput Mbps"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "ul_goodput_mbps"
			ext    = ""
			desc   = "Uplink goodput Mbps"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "bufferbloat_inflation_factor"
			ext    = ""
			desc   = "Bufferbloat inflation factor"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "cap_detected_mbps"
			ext    = ""
			desc   = "Detected throughput cap Mbps"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "near_ttfb_median_ms"
			ext    = ""
			desc   = "Near reflector TTFB median (ms)"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "near_ttfb_p95_ms"
			ext    = ""
			desc   = "Near reflector TTFB p95 (ms)"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "near_ttfb_p99_ms"
			ext    = ""
			desc   = "Near reflector TTFB p99 (ms)"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "far_ttfb_median_ms"
			ext    = ""
			desc   = "Far reflector TTFB median (ms)"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "far_ttfb_p95_ms"
			ext    = ""
			desc   = "Far reflector TTFB p95 (ms)"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "far_ttfb_p99_ms"
			ext    = ""
			desc   = "Far reflector TTFB p99 (ms)"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "probe_success_rate_pct"
			ext    = ""
			desc   = "Probe success rate percent (0..100)"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "stall_rate_pct"
			ext    = ""
			desc   = "Stall rate percent (0..100)"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "last_micro_ts"
			ext    = ""
			desc   = "Last micro probe timestamp (unix seconds)"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "last_multi_ts"
			ext    = ""
			desc   = "Last multi probe timestamp (unix seconds)"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "last_change_ts"
			ext    = ""
			desc   = "Last state change timestamp (unix seconds)"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "last_classify_ts"
			ext    = ""
			desc   = "Last classify timestamp (unix seconds)"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "last_diag_ts"
			ext    = ""
			desc   = "Last diag timestamp (unix seconds)"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "diag_present"
			ext    = ""
			desc   = "1 if lastDiagName is non-empty, else 0"
			type   = "METRICTYPE_GAUGE"
			labels = []

[[stats]]
	[[stats.power]]
		source = "power"
		agent  = "power_agent"
		# url is treated as the PATH for the service endpoint
		# (agent will resolve port via /etc/services using usys_find_service_port()).
		url    = "/v1/metrics"

		[[stats.power.power.kpi]]
			name   = "power_ok"
			ext    = ""
			desc   = "Power app health status (1=ok, 0=not ok)"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.power.power.kpi]]
			name   = "power_total_watts"
			ext    = ""
			desc   = "Total measured power in watts"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.power.power.kpi]]
			name   = "power_energy_wh"
			ext    = ""
			desc   = "Accumulated energy in watt-hours"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.power.power.kpi]]
			name   = "power_board_temp_c"
			ext    = ""
			desc   = "Board temperature from LM75 in celsius"
			unit   = "celsius"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.power.power.kpi]]
			name   = "power_lm25066_in_volts"
			ext    = ""
			desc   = "LM25066 input voltage"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.power.power.kpi]]
			name   = "power_lm25066_out_volts"
			ext    = ""
			desc   = "LM25066 output voltage"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.power.power.kpi]]
			name   = "power_lm25066_in_amps"
			ext    = ""
			desc   = "LM25066 input current"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.power.power.kpi]]
			name   = "power_lm25066_in_watts"
			ext    = ""
			desc   = "LM25066 input power"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.power.power.kpi]]
			name   = "power_lm25066_temp_c"
			ext    = ""
			desc   = "LM25066 hotspot temperature in celsius"
			unit   = "celsius"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.power.power.kpi]]
			name   = "power_lm25066_status_word"
			ext    = ""
			desc   = "LM25066 status word"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.power.power.kpi]]
			name   = "power_lm25066_diagnostic_word"
			ext    = ""
			desc   = "LM25066 diagnostic word"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.power.power.kpi]]
			name   = "power_lm25066_assumed_direct"
			ext    = ""
			desc   = "LM25066 direct-scaling flag"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.power.power.kpi]]
			name   = "power_ads1015_adc_vin"
			ext    = ""
			desc   = "ADS1015 VIN ADC channel"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.power.power.kpi]]
			name   = "power_ads1015_adc_vpa"
			ext    = ""
			desc   = "ADS1015 VPA ADC channel"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.power.power.kpi]]
			name   = "power_ads1015_adc_aux"
			ext    = ""
			desc   = "ADS1015 AUX ADC channel"
			type   = "METRICTYPE_GAUGE"
			labels = []

[[stats]]
    [[stats.sensors]]
        source = "thermal_zone0"
        agent  = "thermal_agent"
        url    = "/sys/class/thermal/thermal_zone0/"

        [[stats.sensors.thermal_zone0.kpi]]
            name   = "temperature"
            ext    = "temp"
            desc   = "CPU thermal zone 0 temperature"
            unit   = "celsius"
            type   = "METRICTYPE_GAUGE"
            labels = []

    [[stats.sensors]]
        source = "thermal_zone1"
        agent  = "thermal_agent"
        url    = "/sys/class/thermal/thermal_zone1/"

        [[stats.sensors.thermal_zone1.kpi]]
