[[stats]]
	[[stats.backhaul]]
		source = "backhaul"
		agent  = "backhaul_agent"
		# url is treated as the PATH for the service endpoint
		# (agent will resolve port via /etc/services using usys_find_service_port()).
		url    = "/v1/status"

		[[stats.backhaul.backhaul.kpi]]
			name   = "state"
			ext    = ""
			desc   = "Backhaul state as numeric code (DOWN=0, LIMITED=1, GOOD=2, UNKNOWN=3)"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "link_guess"
			ext    = ""
			desc   = "Link classification numeric code (UNKNOWN=0, TERRESTRIAL_LIKE=1, SAT_LIKE=2, CELLULAR_LIKE=3)"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "confidence"
			ext    = ""
			desc   = "Classifier confidence (0..1)"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "dl_goodput_mbps"
			ext    = ""
			desc   = "Downlink goodput Mbps"
			type   = "METRICTYPE_GAUGE"
			labels = []

		[[stats.backhaul.backhaul.kpi]]
			name   = "ul_goodput_mbps"
