            labels = []

        [[stats.network.uplink.kpi]]
            name   = "latency"
            ext    = ""
            desc   = "Latency to reach cloud"
            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "linkspeed"
            ext    = ""
            desc   = "Link speed negotiated"
            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "rx_bytes"
            ext    = ""
            desc   = "Received bytes"
            type   = "METRICTYPE_GAUGE"
            labels = []

        [[stats.network.uplink.kpi]]
            name   = "rx_error"
