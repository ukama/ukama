# init-network.d reference config for virtual tower node.
# North star: EPC TUN traffic must pass through OVS before Internet breakout.

[server]
port = 18091
cmd_timeout_sec = 10

[ovs]
bridge = "br0"
openflow = "OpenFlow15"
management_dir = "/usr/local/var/run/openvswitch"
run_dir = "/var/run/openvswitch"
db_dir = "/etc/openvswitch"
schema = "/usr/share/openvswitch/vswitch.ovsschema"

[bridge]
address = "10.10.10.1"
netmask = "255.255.255.0"
cidr = "10.10.10.1/24"
subnet = "10.10.10.0/24"

[ue]
cidr = "192.168.8.0/22"
default_drop = true

# EPCEMU owns tun3. init-network only routes around tun3 after it exists.
[tun]
enable = false
interface = "tun3"
primary_cidr = "192.168.8.1/22"
extra_cidrs = []

[epc]
enable = false
interface = "enp60s0"
sctp_address = "10.102.81.3"
gtpu_address = "10.102.81.75"

[routing]
external_if = "eth0"
enable_ip_forward = true
enable_nat = true
enable_policy_routing = true
tun_table = 2000
bridge_table = 1000

# This is the br0-side Internet gateway/forwarder, not the media server.
# Media stays outside the virtualnode/UE host.
[gateway]
enable = true
mode = "netns"
name = "ukama-gw"
bridge_if = "gw-br"
namespace_if = "gw0"
address = "10.10.10.11/24"
ip = "10.10.10.11"
