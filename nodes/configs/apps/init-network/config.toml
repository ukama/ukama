# init-network.d reference config for virtual tower node.
# Values are based on pcrf/script/setupBridge.sh.

[server]
port = 18091
cmd_timeout_sec = 10

[ovs]
bridge = "br0"
openflow = "OpenFlow15"
management_dir = "/usr/local/var/run/openvswitch"
run_dir = "/var/run/openvswitch"
db_dir = "/etc/openvswitch"
schema = "/usr/share/openvswitch/vswitch.ovsschema"

[bridge]
address = "10.10.10.1"
netmask = "255.255.255.0"
cidr = "10.10.10.1/24"
subnet = "10.10.10.0/24"

[ue]
cidr = "192.168.8.0/22"
default_drop = true

# setupBridge.sh creates tun3 and assigns 192.168.9.20-28/22.
# Disabled by default until EPC-emu owns the stable user-plane contract.
[tun]
enable = false
interface = "tun3"
primary_cidr = "192.168.9.20/22"
extra_cidrs = [
  "192.168.9.21/22",
  "192.168.9.22/22",
  "192.168.9.23/22",
  "192.168.9.24/22",
  "192.168.9.25/22",
  "192.168.9.26/22",
  "192.168.9.27/22",
  "192.168.9.28/22"
]

# setupBridge.sh configures aliases on ETHIF=enp60s0.
# For virtual-node this may be replaced by EPC-emu networking.
[epc]
enable = false
interface = "enp60s0"
sctp_address = "10.102.81.3"
gtpu_address = "10.102.81.75"

[routing]
external_if = "wlo1"
enable_ip_forward = true
enable_nat = true
enable_policy_routing = false

# setupBridge.sh used a docker gateway container cont1 at 10.10.10.11/24.
# init-network.d does not start this container. This is recorded here for the
# next step, when EPC/media interface wiring is finalized.
[gateway]
container = "cont1"
address = "10.10.10.11/24"
ip = "10.10.10.11"
