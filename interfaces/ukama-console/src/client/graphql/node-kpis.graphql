# Node health KPIs — split from NodeDetail so it can poll independently
# (metric service is polling-only; NodeDetail stays a one-shot composite).

query NodeKpis($nodeId: String!) {
  nodeView(nodeId: $nodeId) {
    nodeId
    kpis {
      error {
        ...SectionErrorFields
      }
      metrics {
        key
        value
        timestamp
        success
      }
    }
  }
}
