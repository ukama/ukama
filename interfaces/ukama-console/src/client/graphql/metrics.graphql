# Operations lifted verbatim from interfaces/console (the legacy console)
# as the Phase-2 API reference.
# Served by the METRICS endpoint (NEXT_PUBLIC_METRIC_URL), separate codegen target. Trim to what each screen needs as screens
# are wired; run `pnpm codegen` to (re)generate types/hooks.

query GetMetricByTab($data: GetMetricByTabInput!) {
  getMetricByTab(data: $data) {
    metrics {
      dataPlanId
      format
      msg
      networkId
      nodeId
      siteId
      packageId
      success
      tickInterval
      threshold {
        max
        min
        normal
      }
      tickPositions
      type
      unit
      values
    }
  }
}

