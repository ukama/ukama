# Operations lifted verbatim from interfaces/console (the legacy console)
# as the Phase-2 API reference. Trim to what each screen needs as screens
# are wired; run `pnpm codegen` to (re)generate types/hooks.

fragment UNetwork on NetworkDto {
  id
  name
  isDefault
  budget
  overdraft
  trafficPolicy
  isDeactivated
  paymentLinks
  createdAt
  countries
  networks
}

query getNetworks {
  getNetworks {
    networks {
      ...UNetwork
    }
  }
}

query getNetwork($networkId: String!) {
  getNetwork(networkId: $networkId) {
    ...UNetwork
  }
}

mutation AddNetwork($data: AddNetworkInputDto!) {
  addNetwork(data: $data) {
    ...UNetwork
  }
}

mutation SetDefaultNetwork($data: SetDefaultNetworkInputDto!) {
  setDefaultNetwork(data: $data) {
    success
  }
}

