# Operations lifted verbatim from interfaces/console (the legacy console)
# as the Phase-2 API reference. Trim to what each screen needs as screens
# are wired; run `pnpm codegen` to (re)generate types/hooks.

fragment member on MemberDto {
  role
  userId
  id: memberId
  isDeactivated
  memberSince
}

query GetMembers {
  getMembers {
    members {
      ...member
      name
      email
    }
  }
}

query GetMember($memberId: String!) {
  getMember(id: $memberId) {
    ...member
  }
}

mutation addMember($data: AddMemberInputDto!) {
  addMember(data: $data) {
    ...member
  }
}

mutation removeMember($memberId: String!) {
  removeMember(id: $memberId) {
    success
  }
}

mutation updateMember($memberId: String!, $data: UpdateMemberInputDto!) {
  updateMember(memberId: $memberId, data: $data) {
    success
  }
}

query GetMemberByUserId($userId: String!) {
  getMemberByUserId(userId: $userId) {
    userId
    name
    email
    memberId
    isDeactivated
    role
    memberSince
  }
}

