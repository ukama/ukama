# SIM pool screen (network + business manage) — one query over the
# simPoolView composite; both screens use this document.

query SimPoolOverview($simType: String!, $limit: Int! = 20) {
  simPoolView(simType: $simType) {
    simType
    stats {
      error {
        ...SectionErrorFields
      }
      total
      available
      consumed
      failed
      esim
      physical
      pctAssigned
      lowStock
    }
    sims(limit: $limit) {
      error {
        ...SectionErrorFields
      }
      sims {
        id
        iccid
        msisdn
        isAllocated
        isFailed
        simType
        isPhysical
        createdAt
      }
    }
  }
}
