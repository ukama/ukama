# Polled range metrics for charts (plan Phase 4 — polling only, no
# subscriptions in v1). Poll with a screen-scoped, visibility-gated interval.

query MetricsRange($data: MetricsRangeInput!) {
  metricsRange(data: $data) {
    metrics {
      type
      label
      success
      nodeId
      siteId
      values
      unit
      format
      tickInterval
      tickPositions
      threshold {
        min
        normal
        max
      }
    }
  }
}
