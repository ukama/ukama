# Network-lens customers screen — one query over the subscribersView
# composite (read-only selection; business lens adds its own document).

query NetworkCustomers($networkId: String!) {
  subscribersView(networkId: $networkId) {
    networkId
    subscribers {
      error {
        ...SectionErrorFields
      }
      subscribers {
        uuid
        name
        phone
        email
        networkId
        sim {
          id
          iccid
          msisdn
          status
          type
          package {
            package_id
            is_active
            updated_at
          }
        }
      }
    }
    plans {
      error {
        ...SectionErrorFields
      }
      plans {
        packageId
        name
      }
    }
    usage {
      error {
        ...SectionErrorFields
      }
    }
  }
}
