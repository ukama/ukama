# Operations lifted verbatim from interfaces/console (the legacy console)
# as the Phase-2 API reference. Trim to what each screen needs as screens
# are wired; run `pnpm codegen` to (re)generate types/hooks.

query Software($data: GetSoftwaresInput!) {
  getSoftwares(data: $data) {
    software {
      id
      releaseDate
      nodeId
      status
      changeLog
      currentVersion
      desiredVersion
      name
      space
      notes
      metricsKeys
      createdAt
      updatedAt
    }
  }
}

mutation UpdateSoftware($data: UpdateSoftwareInputDto!) {
  updateSoftware(data: $data) {
    message
  }
}
### Software End ###
