# Operations lifted verbatim from interfaces/console (the legacy console)
# as the Phase-2 API reference. Trim to what each screen needs as screens
# are wired; run `pnpm codegen` to (re)generate types/hooks.

fragment USite on SiteDto {
  id
  name
  networkId
  backhaulId
  powerId
  accessId
  spectrumId
  switchId
  isDeactivated
  latitude
  longitude
  installDate
  createdAt
  location
}

query getSite($siteId: String!) {
  getSite(siteId: $siteId) {
    ...USite
  }
}
mutation addSite($data: AddSiteInputDto!) {
  addSite(data: $data) {
    ...USite
  }
}

query GetSites($data: SitesInputDto!) {
  getSites(data: $data) {
    sites {
      ...USite
    }
  }
}

mutation updateSite($siteId: String!, $data: UpdateSiteInputDto!) {
  updateSite(siteId: $siteId, data: $data) {
    name
  }
}

