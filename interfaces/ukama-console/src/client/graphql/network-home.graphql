# Network home screen — one query over the networkOverview composite.

# TopBar notifications menu — polled (~60s, visible tab) selection over the
# same composite; shares the cache entry with NetworkHome.
query TopBarAlerts($networkId: String!) {
  networkOverview(networkId: $networkId) {
    networkId
    latestAlerts(limit: 10) {
      error {
        ...SectionErrorFields
      }
      notifications {
        id
        title
        description
        type
        isRead
        createdAt
      }
    }
  }
}

query NetworkHome($networkId: String!, $alertLimit: Int! = 5) {
  networkOverview(networkId: $networkId) {
    networkId
    network {
      error {
        ...SectionErrorFields
      }
      network {
        id
        name
        isDefault
      }
    }
    nodeStats {
      error {
        ...SectionErrorFields
      }
      total
      online
      offline
    }
    siteStats {
      error {
        ...SectionErrorFields
      }
      sites {
        ...ViewSite
      }
    }
    subscriberStats {
      error {
        ...SectionErrorFields
      }
      total
      active
      inactive
    }
    latestAlerts(limit: $alertLimit) {
      error {
        ...SectionErrorFields
      }
      notifications {
        id
        title
        description
        type
        isRead
        createdAt
      }
    }
    kpis {
      error {
        ...SectionErrorFields
      }
      metrics {
        key
        value
        timestamp
        success
      }
    }
  }
}
