# Node detail screen — one query over the nodeView composite.

query NodeDetail($nodeId: String!) {
  nodeView(nodeId: $nodeId) {
    nodeId
    node {
      error {
        ...SectionErrorFields
      }
      node {
        ...ViewNode
        latitude
        longitude
        attached {
          id
          name
        }
      }
    }
    site {
      error {
        ...SectionErrorFields
      }
      site {
        id
        name
      }
    }
    siblings {
      error {
        ...SectionErrorFields
      }
      nodes {
        id
        name
      }
    }
    software {
      error {
        ...SectionErrorFields
      }
      softwares {
        software {
          name
          status
          currentVersion
          desiredVersion
          releaseDate
        }
      }
    }
  }
}
