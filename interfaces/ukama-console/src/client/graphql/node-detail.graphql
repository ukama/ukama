# Node detail screen — one query over the nodeView composite.

query NodeDetail($nodeId: String!) {
  nodeView(nodeId: $nodeId) {
    nodeId
    node {
      error {
        ...SectionErrorFields
      }
      node {
        ...ViewNode
        latitude
        longitude
        attached {
          id
          name
        }
      }
    }
    health {
      error {
        ...SectionErrorFields
      }
      health {
        timestamp
        system {
          name
          value
        }
      }
    }
    software {
      error {
        ...SectionErrorFields
      }
      softwares {
        software {
          name
          status
          currentVersion
          desiredVersion
          releaseDate
        }
      }
    }
    stateHistory {
      error {
        ...SectionErrorFields
      }
      stateHistory {
        currentState
        previousState
        createdAt
      }
    }
    kpis {
      error {
        ...SectionErrorFields
      }
      metrics {
        key
        value
        timestamp
        success
      }
    }
    radioStatus {
      error {
        ...SectionErrorFields
      }
    }
  }
}
