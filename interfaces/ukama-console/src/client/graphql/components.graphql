# Operations lifted verbatim from interfaces/console (the legacy console)
# as the Phase-2 API reference. Trim to what each screen needs as screens
# are wired; run `pnpm codegen` to (re)generate types/hooks.

fragment UComponent on ComponentDto {
  id
  inventoryId
  type
  userId
  description
  category
  datasheetUrl
  imageUrl
  partNumber
  manufacturer
  managed
  warranty
  specification
}

query getComponentById($componentId: String!) {
  getComponentById(componentId: $componentId) {
    ...UComponent
  }
}

query GetComponentsByUserId($data: ComponentTypeInputDto!) {
  getComponentsByUserId(data: $data) {
    components {
      ...UComponent
    }
  }
}

