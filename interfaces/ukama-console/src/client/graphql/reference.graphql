# Operations lifted verbatim from interfaces/console (the legacy console)
# as the Phase-2 API reference. Trim to what each screen needs as screens
# are wired; run `pnpm codegen` to (re)generate types/hooks.

query GetCountries {
  getCountries {
    countries {
      name
      code
    }
  }
}

query GetCurrencySymbol($code: String!) {
  getCurrencySymbol(code: $code) {
    code
    symbol
    image
  }
}

query GetTimezones {
  getTimezones {
    timezones {
      value
      abbr
      offset
      isdst
      text
      utc
    }
  }
}

### End Common Data ###

