# Network site detail screen — one query over the siteView composite
# (network lens selection: skips `financials`).

query NetworkSiteDetail($siteId: String!) {
  siteView(siteId: $siteId) {
    siteId
    site {
      error {
        ...SectionErrorFields
      }
      site {
        ...ViewSite
      }
    }
    nodes {
      error {
        ...SectionErrorFields
      }
      nodes {
        ...ViewNode
      }
    }
    components {
      error {
        ...SectionErrorFields
      }
      components {
        elementType
        componentId
        componentName
      }
    }
    power {
      error {
        ...SectionErrorFields
      }
      metrics {
        key
        value
        timestamp
        success
      }
    }
    kpis {
      error {
        ...SectionErrorFields
      }
      metrics {
        key
        value
        timestamp
        success
      }
    }
  }
}
