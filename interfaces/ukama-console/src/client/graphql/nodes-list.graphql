# Nodes list screen + node pool screen — two operations over the nodesView
# composite (node pool skips the `health` gap section entirely).

query NodesList($networkId: String) {
  nodesView(networkId: $networkId) {
    networkId
    nodes {
      error {
        ...SectionErrorFields
      }
      nodes {
        ...ViewNode
      }
    }
    health {
      error {
        ...SectionErrorFields
      }
    }
  }
}

query NodePool {
  nodesView {
    networkId
    nodes {
      error {
        ...SectionErrorFields
      }
      nodes {
        ...ViewNode
      }
    }
  }
}
