# Derived activation state (BFF dashboard/onboardingStatus). Drives the
# setup alert bar, /configure step guards, and resume resolution.

query onboardingStatus {
  onboardingStatus {
    hasNetwork
    hasSite
    hasNode
    networkId
    networkName
  }
}
