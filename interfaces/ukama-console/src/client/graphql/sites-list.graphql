# Sites list screen — one query over the sitesView composite (network lens
# selection: skips `financials`).

query SitesList($networkId: String!) {
  sitesView(networkId: $networkId) {
    networkId
    sites {
      error {
        ...SectionErrorFields
      }
      sites {
        ...ViewSite
      }
    }
    nodeCounts {
      error {
        ...SectionErrorFields
      }
      counts {
        siteId
        total
        online
        offline
      }
    }
    customers {
      error {
        ...SectionErrorFields
      }
      count
    }
    kpis {
      error {
        ...SectionErrorFields
      }
    }
  }
}
