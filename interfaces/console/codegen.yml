overwrite: true
schema:
  # Use local SDL snapshot for CI reliability. Run `pnpm codegen:introspect` to refresh from server.
  - './schema.graphql'
documents: './src/client/graphql/index.graphql'
generates:
  ./src/client/graphql/generated/index.ts:
    plugins:
      - 'typescript'
      - 'typescript-operations'
      - 'typescript-react-apollo'
    config:
      withHooks: true
      addTypename: true
