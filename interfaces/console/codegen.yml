overwrite: true
schema:
  - 'http://localhost:8080/graphql':
      headers:
        introspection: 'true'
documents: './src/client/graphql/index.graphql'
generates:
  ./src/client/graphql/generated/schema-types.ts:
    plugins:
      - 'typescript'
  ./src/client/graphql/generated/operations.ts:
    plugins:
      - 'typescript-operations'
      - 'typescript-react-apollo'
    config:
      withHooks: true
      addTypename: true
      importSchemaTypesFrom: './schema-types.ts'
